<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloomy Buket</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<meta name="theme-color" content="#c3547d">
</head>
<body>
<div class="app">
<h1>🌷 Bloomy</h1>
<p>Kalkulator Modal Buket</p>

<div class="card">
<h3>💐 Bunga</h3>
<div id="flowers"></div>
<button onclick="addFlower()">+ Tambah Bunga</button>
</div>

<div class="card">
<h3>🧸 Boneka</h3>
<label>Jumlah</label>
<input id="bonekaQty" type="number" value="0">
<label>Harga</label>
<input id="bonekaPrice" type="number" value="5000">
</div>

<div class="card">
<h3>📦 Packaging</h3>
<input id="daun" placeholder="Daun (jumlah)" type="number" value="0">
<input id="cello" placeholder="Cello (lembar)" type="number" value="0">
<input id="tissu" placeholder="Tissu (lembar)" type="number" value="0">
</div>

<div class="card">
<h3>⚙️ Biaya</h3>
<input id="listrik" value="5000">
<input id="tenaga" value="25000">
<input id="jasa" value="50000">
</div>

<div class="card">
<h3>📈 Profit</h3>
<input id="profit" value="30">
</div>

<button class="calc" onclick="hitung()">Hitung</button>

<div class="result" id="result">Rp0</div>
</div>

<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('service-worker.js');
}
</script>
</body>
</html>
