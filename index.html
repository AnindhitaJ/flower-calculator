<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bloomy</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
<header><h1>🌷 Bloomy</h1><p>Kalkulator Modal Buket</p></header>

<div class="card">
<h2>💐 Bunga</h2>
<div id="flowers"></div>
<button onclick="addFlower()">＋ Tambah Bunga</button>
</div>

<div class="card">
<h2>🧸 Boneka</h2>
<div id="boneka"></div>
</div>

<div class="card">
<h2>🎀 Packaging</h2>
<div class="line"><span>Cellophane</span><input class="qty" id="cq" value="0"><input class="harga" id="cp" value="3000"></div>
<div class="line"><span>Pita</span><input class="qty" id="pq" value="0"><input class="harga" id="pp" value="2000"></div>
<div class="line"><span>Daun</span><input class="qty" id="dq" value="0"><input class="harga" id="dp" value="1000"></div>
<div class="line"><span>Paper Bag</span><input class="qty" id="pbq" value="0"><input class="harga" id="pbp" value="10000"></div>
</div>

<div class="card">
<h2>⚙️ Biaya</h2>
<div class="line"><span>Listrik</span><input class="harga" id="listrik" value="5000"></div>
<div class="line"><span>Tenaga</span><input class="harga" id="tenaga" value="25000"></div>
<div class="line"><span>Jasa</span><input class="harga" id="jasa" value="50000"></div>
</div>

<div class="card">
<h2>📈 Profit</h2>
<input id="profit" value="30"> %
</div>

<button class="main" onclick="hitung()">Hitung Harga Jual</button>
<div class="result" id="hasil">Rp0</div>
</div>
<script src="app.js"></script>
</body>
</html>
