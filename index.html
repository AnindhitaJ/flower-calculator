<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bloomy</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
<header><h1>🌷 Bloomy</h1><p>Kalkulator Modal Buket</p></header>

<section class="card">
<h2>💐 Bunga</h2>
<div id="flowers"></div>
<button onclick="addFlower()">＋ Tambah Bunga</button>
</section>

<section class="card">
<h2>🧸 Boneka</h2>
<div class="row"><span>8 cm</span><input id="b8q" value="0"><input id="b8p" value="5000"></div>
<div class="row"><span>12 cm</span><input id="b12q" value="0"><input id="b12p" value="18000"></div>
<div class="row"><span>20 cm</span><input id="b20q" value="0"><input id="b20p" value="30000"></div>
</section>

<section class="card">
<h2>🎀 Packaging</h2>
<div class="row"><span>Cellophane</span><input id="cq" value="0"><input id="cp" value="3000"></div>
<div class="row"><span>Pita</span><input id="pq" value="0"><input id="pp" value="2000"></div>
<div class="row"><span>Daun</span><input id="dq" value="0"><input id="dp" value="1000"></div>
<div class="row"><span>Plastik</span><input id="plq" value="0"><input id="plp" value="3000"></div>
<div class="row"><span>Paper Bag</span><input id="pbq" value="0"><input id="pbp" value="10000"></div>
</section>

<section class="card">
<h2>⚙️ Biaya</h2>
<div class="cost">⚡ Listrik <input id="listrik" value="5000"></div>
<div class="cost">👩 Tenaga <input id="tenaga" value="25000"></div>
<div class="cost">✨ Jasa <input id="jasa" value="50000"></div>
</section>

<section class="card">
<h2>📈 Profit</h2>
<input id="profit" value="30"> %
</section>

<button class="main" onclick="hitung()">Hitung Harga Jual</button>

<div class="summary" id="hasil">Modal Rp0<br>Harga Jual Rp0</div>

</div>
<script src="app.js"></script>
</body>
</html>
