<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bloomy</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

<header>
<h1>🌷 Bloomy</h1>
<p>Kalkulator Buket</p>
</header>

<div class="card">
<h2>💐 Bunga</h2>
<div id="flowers"></div>
<button onclick="addFlower()">＋ Tambah Bunga</button>
</div>

<div class="card">
<h2>🧸 Boneka</h2>
<div class="product-row">
<div><b>8 cm</b><small>Rp5.000</small></div>
<input value="0" id="b8">
</div>
<div class="product-row">
<div><b>12 cm</b><small>Rp18.000</small></div>
<input value="0" id="b12">
</div>
<div class="product-row">
<div><b>20 cm</b><small>Rp30.000</small></div>
<input value="0" id="b20">
</div>
</div>

<div class="card">
<h2>🎀 Packaging</h2>
<div class="product-row"><span>Cellophane</span><input value="0"><b>Rp3.000</b></div>
<div class="product-row"><span>Pita</span><input value="0"><b>Rp2.000/m</b></div>
<div class="product-row"><span>Daun</span><input value="0"><b>Rp1.000</b></div>
<div class="product-row"><span>Paper Bag</span><input value="0"><b>Rp10.000</b></div>
</div>

<div class="card">
<h2>⚙️ Biaya</h2>
<div class="cost-row"><span>⚡ Listrik</span><b>Rp5.000</b></div>
<div class="cost-row"><span>👩 Tenaga</span><b>Rp25.000</b></div>
<div class="cost-row"><span>✨ Jasa</span><b>Rp50.000</b></div>
</div>

<div class="card profit">
<h2>📈 Profit</h2>
<div class="profit-row">
<input value="30"><span>%</span>
</div>
</div>

<div class="summary">
<p>Total Modal</p>
<h2>Rp0</h2>
<p>Harga Jual</p>
<h1>Rp0</h1>
</div>

</div>
<script src="app.js"></script>
</body>
</html>
