<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bloomy</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
<div class="header">
<h1>🌷 Bloomy</h1>
<p>Kalkulator Modal Buket</p>
</div>

<div class="card">
<h2>💐 Bunga</h2>
<div id="flowers"></div>
<button onclick="addFlower()">+ Tambah Bunga</button>
</div>

<div class="card">
<h2>🧸 Boneka</h2>
<div class="item"><span>Boneka 8 cm</span><input class="qty" id="b8q" value="0"><input class="nominal" id="b8p" value="5000"></div>
<div class="item"><span>Boneka 12 cm</span><input class="qty" id="b12q" value="0"><input class="nominal" id="b12p" value="18000"></div>
<div class="item"><span>Boneka 20 cm</span><input class="qty" id="b20q" value="0"><input class="nominal" id="b20p" value="30000"></div>
</div>

<div class="card">
<h2>🎀 Packaging</h2>
<div class="item"><span>Cellophane</span><input class="qty" id="cq" value="0"><input class="nominal" id="cp" value="3000"></div>
<div class="item"><span>Pita</span><input class="qty" id="pq" value="0"><input class="nominal" id="pp" value="2000"></div>
<div class="item"><span>Daun</span><input class="qty" id="dq" value="0"><input class="nominal" id="dp" value="1000"></div>
<div class="item"><span>Paper Bag</span><input class="qty" id="pbq" value="0"><input class="nominal" id="pbp" value="10000"></div>
</div>

<div class="card">
<h2>⚙️ Biaya</h2>
<div class="item"><span>Listrik</span><input class="nominal" id="listrik" value="5000"></div>
<div class="item"><span>Tenaga</span><input class="nominal" id="tenaga" value="25000"></div>
<div class="item"><span>Jasa</span><input class="nominal" id="jasa" value="50000"></div>
</div>

<div class="card">
<h2>📈 Profit</h2>
<input id="profit" value="30"> %
</div>

<button class="main" onclick="hitung()">Hitung Harga Jual</button>
<div class="result" id="hasil">Rp0</div>
</div>

<script src="app.js"></script>
</body>
</html>
