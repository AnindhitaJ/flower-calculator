<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bloomy</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
<h1>🌷 Bloomy</h1>

<section class="card">
<h2>🎀 Packaging</h2>
<div class="item"><b>Kertas Cellophane</b><input id="cellQty" placeholder="Jumlah lembar" value="0"><input class="harga" id="cellPrice" value="3000"></div>
<div class="item"><b>Pita</b><input id="ribbonQty" placeholder="Jumlah meter" value="0"><input class="harga" id="ribbonPrice" value="2000"></div>
<div class="item"><b>Daun</b><input id="leafQty" placeholder="Jumlah batang" value="0"><input class="harga" id="leafPrice" value="1000"></div>
<div class="item"><b>Plastik/Paper Bag</b><input id="bagQty" value="0"><input class="harga" id="bagPrice" value="10000"></div>
</section>

<section class="card">
<h2>🍫 Snack</h2>
<div class="item">
<input id="snackName" placeholder="Nama snack">
<input id="snackQty" placeholder="Jumlah" value="0">
<input class="harga" id="snackPrice" value="0">
</div>
</section>

<section class="card">
<h2>💰 Total</h2>
<button onclick="hitung()">Hitung</button>
<div id="hasil"></div>
</section>

</div>
<script src="app.js"></script>
</body>
</html>
