<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bloomy Builder Buket</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
<div class="app">
<h1>🌷 Bloomy Buket Builder</h1>

<div class="card">
<h2>Session Menu</h2>
<input id="sessionName" placeholder="Nama koleksi buket">
<button onclick="buatSession()">Buat Session</button>
<select id="sessionList" onchange="loadSession()"></select>
</div>

<div class="card">
<h2>Buat Buket</h2>
<input id="namaBuket" placeholder="Nama Buket">

<h3>Isi Bunga</h3>
<div id="items"></div>
<button onclick="addItem()">+ Tambah Komponen</button>

<div class="row">
<label>Harga Jual</label>
<input id="hargaJual" type="number" value="0">
</div>

<button onclick="simpanBuket()">Simpan Buket</button>
</div>

<div class="card">
<h2>Daftar Buket</h2>
<div id="listBuket"></div>
<button onclick="pdfPrice()">Download PDF Pricelist</button>
<button onclick="pdfBreak()">Download PDF Breakdown</button>
</div>

</div>
<script src="script.js"></script>
</body>
</html>
