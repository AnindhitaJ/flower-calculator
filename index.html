<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bloomy — Kalkulator Buket</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#bd527c">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <header class="app-header">
    <div class="header-blob" aria-hidden="true"></div>
    <div class="header-tools">
      <button type="button" class="icon-btn" id="historyBtn" aria-label="Riwayat pesanan">🕒</button>
      <button type="button" class="icon-btn" id="themeBtn" aria-label="Ganti tema">🌙</button>
    </div>
    <h1>🌷 Bloomy</h1>
    <p>Kalkulator harga buket &amp; hampers kamu</p>
  </header>

  <main id="app"></main>

  <div class="cta-spacer"></div>
</div>

<div class="cta-bar">
  <div class="cta-bar-inner">
    <button type="button" class="reset-btn" id="resetBtn" aria-label="Reset form">↺</button>
    <button class="calc-btn" onclick="calculate()">
      <span>Hitung Harga Jual</span>
    </button>
  </div>
</div>

<div class="overlay" id="historyOverlay">
  <div class="panel">
    <div class="panel-head">
      <h2>🕒 Riwayat Pesanan</h2>
      <button type="button" class="panel-close" id="closeHistoryBtn" aria-label="Tutup">✕</button>
    </div>
    <div class="panel-body" id="historyList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
