<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kalkulator Buket Bunga</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card">
<h1>🌸 Kalkulator Buket Bunga</h1>

<h3>Bunga</h3>
<div id="bungaArea"></div>
<button onclick="tambahBunga()">+ Tambah Bunga</button>

<h3>Daun & Packaging</h3>
<div class="row"><span>Daun</span><input id="daunJumlah" type="number" value="0"><select id="daunHarga"><option>1000</option><option>2000</option><option>3000</option></select></div>
<div class="row"><span>Kertas Cello</span><input id="celloJumlah" type="number" value="0"><select id="celloHarga"><option>3000</option><option>4000</option><option>5000</option></select></div>
<div class="row"><span>Kain Tissu</span><input id="tissuJumlah" type="number" value="0"><select id="tissuHarga"><option>1000</option><option>2000</option><option>3000</option></select></div>

<h3>Biaya</h3>
<div class="row"><span>Listrik</span><input id="listrik" value="5000"></div>
<div class="row"><span>Tenaga</span><input id="tenaga" value="25000"></div>
<div class="row"><span>Jasa</span><input id="jasa" value="50000"></div>

<button onclick="hitung()">Hitung Total</button>
<h2 id="hasil">Total Modal: Rp0</h2>

</div>
<script src="script.js"></script>
</body>
</html>
