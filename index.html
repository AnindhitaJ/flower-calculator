<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bloomy Fix</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
<header><h1>🌷 Bloomy</h1><p>Kalkulator Buket</p></header>

<div class="summary">
Total Modal
<h2 id="modal">Rp0</h2>
Harga Jual
<h1 id="jual">Rp0</h1>
</div>

<section class="card">
<h2>💐 Bunga</h2>
<div id="flowers"></div>
<button onclick="addFlower()">+ Tambah Bunga</button>
</section>

<section class="card">
<h2>🧸 Boneka</h2>
<div id="boneka"></div>
</section>

<section class="card">
<h2>🎀 Packaging</h2>
<div id="packaging"></div>
</section>

<section class="card">
<h2>🍫 Snack</h2>
<label>Nama Snack</label>
<input id="snackName" placeholder="Contoh: SilverQueen">
<label>Jumlah</label>
<input id="snackQty" value="0">
<label>Harga</label>
<input class="harga" id="snackPrice" placeholder="Rp10.000">
</section>

<section class="card">
<h2>⚙️ Biaya</h2>
<input class="harga" id="listrik" value="5000" placeholder="Listrik">
<input class="harga" id="tenaga" value="25000" placeholder="Tenaga">
<input class="harga" id="jasa" value="50000" placeholder="Jasa">
</section>

<section class="card">
<h2>📈 Profit</h2>
<input id="profit" value="30">
</section>

<button class="main" onclick="hitung()">Hitung Harga Jual</button>
</div>

<script src="app.js"></script>
</body>
</html>
