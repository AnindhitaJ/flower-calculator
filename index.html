<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bloomy</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

<header>
<h1>🌷 Bloomy</h1>
<p>Rancang Buket & Hitung Harga Jual</p>
</header>

<section class="card">
<h2>💐 Komponen Buket</h2>
<div id="items"></div>
<button class="add" onclick="addItem()">＋ Tambah Komponen</button>
</section>

<section class="card">
<h2>🧸 Boneka</h2>
<div class="product">
<div>
<b>Boneka 8 cm</b>
<p>Rp5.000</p>
</div>
<input id="boneka" type="number" value="0">
</div>
<div class="product">
<div>
<b>Boneka 12 cm</b>
<p>Rp18.000</p>
</div>
<input id="boneka2" type="number" value="0">
</div>
<div class="product">
<div>
<b>Boneka 20 cm</b>
<p>Rp30.000</p>
</div>
<input id="boneka3" type="number" value="0">
</div>
</section>

<section class="card">
<h2>⚙️ Biaya</h2>
<div class="line"><span>Listrik</span><input id="listrik" value="5000"></div>
<div class="line"><span>Tenaga</span><input id="tenaga" value="25000"></div>
<div class="line"><span>Jasa</span><input id="jasa" value="50000"></div>
</section>

<section class="card">
<h2>📈 Profit</h2>
<div class="line"><span>Margin</span><input id="profit" value="30">%</div>
</section>

<button class="calculate" onclick="hitung()">Hitung Harga</button>

<section class="summary">
<p>Total Modal</p>
<h2 id="modal">Rp0</h2>

<p>Harga Jual</p>
<h1 id="jual">Rp0</h1>
</section>

</div>
<script src="app.js"></script>
</body>
</html>
