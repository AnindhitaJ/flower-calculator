<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloomy PWA</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
<h1>🌷 Bloomy</h1>
<p>Kalkulator & Menu Buket</p>

<div class="card">
<h2>🧮 Kalkulator Buket</h2>

<div id="items"></div>
<button onclick="addItem()">+ Tambah Bunga</button>

<h3>Total Modal</h3>
<h2 id="modal">Rp0</h2>

<label>Profit (%)</label>
<input id="profit" value="30">

<h3>Harga Jual</h3>
<h2 id="jual">Rp0</h2>

<button onclick="simpanMenu()">Masukkan ke Menu</button>
</div>

<div class="card">
<h2>🌸 Buat Menu</h2>
<input id="namaMenu" placeholder="Nama Buket">
<input id="hargaMenu" placeholder="Harga Jual">

<button onclick="buatMenu()">Simpan Menu</button>

<h3>Daftar Menu</h3>
<div id="menuList"></div>
</div>

</div>

<script src="app.js"></script>
</body>
</html>
